<!doctype html><html lang="id" data-theme="light"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ title or 'Simulasi Kriptografi Klasik' }}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head><body><nav class="navbar navbar-expand-lg sticky-top glass"><div class="container"><a class="navbar-brand fw-bold" href="{{ url_for('index') }}">🔐 KriptoClass</a><button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="nav"><ul class="navbar-nav ms-auto"><li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Home</a></li><li class="nav-item"><a class="nav-link" href="{{ url_for('history') }}">History</a></li><li class="nav-item"><button class="btn btn-sm btn-outline-primary ms-lg-2" id="themeBtn">🌙/☀️</button></li></ul></div></div></nav><main class="container py-4">{% with messages=get_flashed_messages(with_categories=true) %}{% for cat,msg in messages %}<div class="alert alert-{{cat}} shadow-sm">{{msg}}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main><footer class="py-4 text-center small opacity-75">Aplikasi Web Simulasi Kriptografi Klasik - Purnamasari</footer><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="{{ url_for('static', filename='js/main.js') }}"></script></body></html>
