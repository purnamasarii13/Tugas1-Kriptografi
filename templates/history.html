{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between align-items-center mb-3"><h2 class="fw-bold">Riwayat Enkripsi/Dekripsi</h2><a class="btn btn-outline-danger btn-sm" href="{{ url_for('clear_history') }}">Hapus History</a></div><div class="card shadow-sm"><div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>Waktu</th><th>Algoritma</th><th>Mode</th><th>Input</th><th>Output</th></tr></thead><tbody>{% for h in history %}<tr><td>{{ h.time }}</td><td>{{ h.cipher }}</td><td>{{ h.mode }}</td><td>{{ h.input }}</td><td><b>{{ h.output }}</b></td></tr>{% else %}<tr><td colspan="5" class="text-center py-4">Belum ada history.</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
